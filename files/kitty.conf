background_opacity 0.7
map ctrl+shift+n new_os_window_with_cwd

# Font: defaults to Noto Sans Mono CJK JP (Latin + CJK in one).
# To use a different CJK region, uncomment the matching line below
# (SC = Simplified Chinese, TC = Traditional Chinese, KR = Korean).
# To use Sarasa Mono instead (tighter Latin, smaller CJK glyphs),
# uncomment one of the Sarasa lines.
font_family      Noto Sans Mono CJK JP
# font_family    Noto Sans Mono CJK SC
# font_family    Noto Sans Mono CJK TC
# font_family    Noto Sans Mono CJK KR
# font_family    Sarasa Mono J
# font_family    Sarasa Mono SC
# font_family    Sarasa Mono TC
# font_family    Sarasa Mono K
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B7,U+E700-U+E8EF,U+EA60-U+EBEB,U+ED00-U+F2FF,U+F300-U+F381,U+F400-U+F533,U+F0001-U+F1AF0 Symbols Nerd Font
