# zram-swap: compressed in-RAM swap so the kernel has reclaim headroom under
# memory pressure. Pairs with systemd-oomd, which acts on PSI before the
# kernel reclaim path stalls. With no swap at all, OOM may never fire and the
# system can hang for minutes before recovering (or needs a hard reset).

[zram0]
# Cap at 16 GiB; zstd typically compresses anon pages 3-4x, so this gives
# effectively ~50 GiB of swappable space on machines with enough RAM.
zram-size = min(ram / 4, 16384)
compression-algorithm = zstd
# Higher than any disk swapfile (default 0) so the kernel prefers zram.
swap-priority = 100
