<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Make Japanese kanji render with Japanese glyph forms even for apps
  that don't tag text with lang="ja" (e.g. the Qt chrome of Anki, file
  managers, Electron apps).

  On this system the default sans-serif fallback chain only includes
  "Sarasa Mono CL" (Classical Chinese) as a CJK provider, which causes
  shared kanji to render with CN glyph forms. Inserting Noto CJK JP
  ahead of it forces Han Unification to resolve to Japanese variants.

  Layered intentionally:
    1. lang=ja matches → JP face wins outright (option 1+2 of guide).
    2. Untagged generic family lookups → JP face inserted into the
       fallback chain ahead of any CN/TC/CL face, so glyph-level
       fallback picks JP for shared kanji.
-->
<fontconfig>
  <!-- 1. Explicit lang=ja preference. -->
  <match>
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>
  <match>
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>
  <match>
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Mono CJK JP</string>
    </edit>
  </match>

  <!--
    2. Inject JP CJK into the generic-family fallback chain so apps
       that don't tag lang=ja still get JP kanji glyphs. Latin is
       served by the default Latin-only family ahead of these.
  -->
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK KR</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK KR</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>Noto Sans Mono CJK KR</family>
    </prefer>
  </alias>
</fontconfig>
